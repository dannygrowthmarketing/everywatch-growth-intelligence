<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet">
  <!-- Background -->
  <rect width="1400" height="700" fill="#161410"/>

  <!-- Top engraved label -->
  <line x1="60"   y1="48" x2="200"  y2="48" stroke="#8A6F38" stroke-width="0.6"/>
  <line x1="1200" y1="48" x2="1340" y2="48" stroke="#8A6F38" stroke-width="0.6"/>
  <text x="700" y="52" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#C8A763" letter-spacing="8">THE GROWTH CALIBRE — REF. D.D.</text>
  <text x="700" y="74" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="15" fill="#A89D85">A movement diagram, transmitting force from input channels through to compounding outputs</text>

  <!-- Engraved column dividers (mainplate sections) -->
  <g stroke="#3A332A" stroke-width="0.5" opacity="0.6">
    <line x1="320" y1="120" x2="320" y2="600"/>
    <line x1="780" y1="120" x2="780" y2="600"/>
    <line x1="1100" y1="120" x2="1100" y2="600"/>
  </g>

  <!-- Stage labels (engraved at top of each column) -->
  <text x="170" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8A6F38" letter-spacing="4">INPUT WHEELS</text>
  <text x="550" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8A6F38" letter-spacing="4">MAINSPRING · CENTRE WHEEL</text>
  <text x="940" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8A6F38" letter-spacing="4">GOING TRAIN</text>
  <text x="1240" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8A6F38" letter-spacing="4">ESCAPEMENT</text>

  <!-- ============== INPUT WHEELS (left column) ============== -->
  <!-- SEO -->
  <g transform="translate(170, 220)">
    <circle r="50" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.8"/>
    <circle r="42" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0"   y1="-50" x2="0"   y2="-42"/>
      <line x1="0"   y1="50"  x2="0"   y2="42"/>
      <line x1="-50" y1="0"   x2="-42" y2="0"/>
      <line x1="50"  y1="0"   x2="42"  y2="0"/>
      <line x1="-35" y1="-35" x2="-30" y2="-30"/>
      <line x1="35"  y1="-35" x2="30"  y2="-30"/>
      <line x1="-35" y1="35"  x2="-30" y2="30"/>
      <line x1="35"  y1="35"  x2="30"  y2="30"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
    </g>
    <circle r="3.5" fill="#C8A763"/>
    <circle r="2.5" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <text x="0" y="-72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8A763" letter-spacing="3">I.</text>
    <text x="0" y="78" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">Organic</text>
    <text x="0" y="96" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="3">SEO · CONTENT</text>
  </g>

  <!-- CRM -->
  <g transform="translate(170, 380)">
    <circle r="50" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.8"/>
    <circle r="42" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0"   y1="-50" x2="0"   y2="-42"/>
      <line x1="0"   y1="50"  x2="0"   y2="42"/>
      <line x1="-50" y1="0"   x2="-42" y2="0"/>
      <line x1="50"  y1="0"   x2="42"  y2="0"/>
      <line x1="-35" y1="-35" x2="-30" y2="-30"/>
      <line x1="35"  y1="-35" x2="30"  y2="-30"/>
      <line x1="-35" y1="35"  x2="-30" y2="30"/>
      <line x1="35"  y1="35"  x2="30"  y2="30"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
    </g>
    <circle r="3.5" fill="#C8A763"/>
    <circle r="2.5" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <text x="0" y="-72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8A763" letter-spacing="3">II.</text>
    <text x="0" y="78" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">Lifecycle</text>
    <text x="0" y="96" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="3">CRM · RETENTION</text>
  </g>

  <!-- Ads -->
  <g transform="translate(170, 540)">
    <circle r="50" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.8"/>
    <circle r="42" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0"   y1="-50" x2="0"   y2="-42"/>
      <line x1="0"   y1="50"  x2="0"   y2="42"/>
      <line x1="-50" y1="0"   x2="-42" y2="0"/>
      <line x1="50"  y1="0"   x2="42"  y2="0"/>
      <line x1="-35" y1="-35" x2="-30" y2="-30"/>
      <line x1="35"  y1="-35" x2="30"  y2="-30"/>
      <line x1="-35" y1="35"  x2="-30" y2="30"/>
      <line x1="35"  y1="35"  x2="30"  y2="30"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
    </g>
    <circle r="3.5" fill="#C8A763"/>
    <circle r="2.5" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <text x="0" y="-72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8A763" letter-spacing="3">III.</text>
    <text x="0" y="78" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">Paid Media</text>
    <text x="0" y="96" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="3">GOOGLE · META · LINKEDIN</text>
  </g>

  <!-- Transmission paths from inputs to central calibre -->
  <g stroke="#8A6F38" stroke-width="0.6" fill="none" opacity="0.75">
    <path d="M 222 220 Q 350 220 430 320" stroke-dasharray="2 3"/>
    <path d="M 222 380 L 430 380" stroke-dasharray="2 3"/>
    <path d="M 222 540 Q 350 540 430 440" stroke-dasharray="2 3"/>
  </g>

  <!-- ============== CENTRAL CALIBRE (Growth Calibre) ============== -->
  <g transform="translate(550, 380)">
    <!-- Outer ring -->
    <circle r="140" fill="#1A1813" stroke="#C8A763" stroke-width="1.2"/>
    <circle r="130" fill="none" stroke="#5C4F38" stroke-width="0.4"/>
    <circle r="120" fill="none" stroke="#3A332A" stroke-width="0.4"/>

    <!-- Bridge across the middle (curved arc covering top) -->
    <path d="M -100 -40 Q 0 -110 100 -40 Q 100 -20 50 -20 Q -50 -20 -100 -40 Z"
          fill="#221E18" stroke="#8A6F38" stroke-width="0.6"/>
    <path d="M -90 -38 Q 0 -100 90 -38 Q 90 -25 45 -25 Q -45 -25 -90 -38 Z"
          fill="none" stroke="#5C4F38" stroke-width="0.3"/>

    <!-- Bridge across the bottom -->
    <path d="M -100 40 Q 0 110 100 40 Q 100 20 50 20 Q -50 20 -100 40 Z"
          fill="#221E18" stroke="#8A6F38" stroke-width="0.6"/>
    <path d="M -90 38 Q 0 100 90 38 Q 90 25 45 25 Q -45 25 -90 38 Z"
          fill="none" stroke="#5C4F38" stroke-width="0.3"/>

    <!-- Guilloché radiating lines -->
    <g stroke="#C8A763" stroke-width="0.3" opacity="0.18">
      <line x1="0" y1="-130" x2="0" y2="130"/>
      <line x1="-130" y1="0" x2="130" y2="0"/>
      <line x1="-92" y1="-92" x2="92" y2="92"/>
      <line x1="92" y1="-92" x2="-92" y2="92"/>
    </g>

    <!-- Central main wheel -->
    <circle r="55" fill="#1F1B16" stroke="#C8A763" stroke-width="0.7"/>
    <circle r="45" fill="none" stroke="#8A6F38" stroke-width="0.4"/>
    <!-- Gear teeth -->
    <g stroke="#C8A763" stroke-width="0.5">
      <line x1="0" y1="-55" x2="0" y2="-48"/>
      <line x1="0" y1="55"  x2="0" y2="48"/>
      <line x1="-55" y1="0" x2="-48" y2="0"/>
      <line x1="55" y1="0"  x2="48" y2="0"/>
      <line x1="-39" y1="-39" x2="-34" y2="-34"/>
      <line x1="39"  y1="-39" x2="34"  y2="-34"/>
      <line x1="-39" y1="39"  x2="-34" y2="34"/>
      <line x1="39"  y1="39"  x2="34"  y2="34"/>
    </g>
    <!-- Spokes -->
    <g stroke="#C8A763" stroke-width="0.6">
      <line x1="0" y1="-42" x2="0" y2="42"/>
      <line x1="-42" y1="0" x2="42" y2="0"/>
      <line x1="-30" y1="-30" x2="30" y2="30"/>
      <line x1="30" y1="-30" x2="-30" y2="30"/>
    </g>
    <circle r="5" fill="#C8A763"/>
    <circle r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.5"/>

    <!-- Jewels at corners of central mechanism -->
    <circle cx="-65" cy="-65" r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <circle cx="65"  cy="-65" r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <circle cx="-65" cy="65"  r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>
    <circle cx="65"  cy="65"  r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.4"/>

    <!-- Engraved label -->
    <text x="0" y="-165" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#C8A763" letter-spacing="6">CALIBRE D.D.</text>
    <text x="0" y="180" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="22" fill="#EFE6D1">The Growth Engine</text>
    <text x="0" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#A89D85" letter-spacing="4">SYSTEMS · STRATEGY · DECISIONS</text>
  </g>

  <!-- Transmission paths from central calibre to going train -->
  <g stroke="#8A6F38" stroke-width="0.6" fill="none" opacity="0.75">
    <path d="M 700 380 L 850 240" stroke-dasharray="2 3"/>
    <path d="M 700 380 L 850 380" stroke-dasharray="2 3"/>
    <path d="M 700 380 L 850 520" stroke-dasharray="2 3"/>
  </g>

  <!-- ============== GOING TRAIN (middle right) ============== -->
  <!-- Analytics -->
  <g transform="translate(940, 240)">
    <circle r="42" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.7"/>
    <circle r="34" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0" y1="-42" x2="0" y2="-34"/>
      <line x1="0" y1="42" x2="0" y2="34"/>
      <line x1="-42" y1="0" x2="-34" y2="0"/>
      <line x1="42" y1="0" x2="34" y2="0"/>
      <line x1="-30" y1="-30" x2="-25" y2="-25"/>
      <line x1="30" y1="-30" x2="25" y2="-25"/>
      <line x1="-30" y1="30" x2="-25" y2="25"/>
      <line x1="30" y1="30" x2="25" y2="25"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-26" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="26" y2="0"/>
    </g>
    <circle r="3" fill="#C8A763"/>
    <circle r="2" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.3"/>
    <text x="62" y="-4" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">Analytics</text>
    <text x="62" y="14" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="2">GA4 · BIGQUERY · LOOKER</text>
  </g>

  <!-- Automation -->
  <g transform="translate(940, 380)">
    <circle r="42" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.7"/>
    <circle r="34" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0" y1="-42" x2="0" y2="-34"/>
      <line x1="0" y1="42" x2="0" y2="34"/>
      <line x1="-42" y1="0" x2="-34" y2="0"/>
      <line x1="42" y1="0" x2="34" y2="0"/>
      <line x1="-30" y1="-30" x2="-25" y2="-25"/>
      <line x1="30" y1="-30" x2="25" y2="-25"/>
      <line x1="-30" y1="30" x2="-25" y2="25"/>
      <line x1="30" y1="30" x2="25" y2="25"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-26" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="26" y2="0"/>
    </g>
    <circle r="3" fill="#C8A763"/>
    <circle r="2" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.3"/>
    <text x="62" y="-4" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">Automation</text>
    <text x="62" y="14" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="2">N8N · ZAPIER · PYTHON</text>
  </g>

  <!-- AI -->
  <g transform="translate(940, 520)">
    <circle r="42" fill="#1F1B16" stroke="#8A6F38" stroke-width="0.7"/>
    <circle r="34" fill="none" stroke="#5C4F38" stroke-width="0.3"/>
    <g stroke="#8A6F38" stroke-width="0.4">
      <line x1="0" y1="-42" x2="0" y2="-34"/>
      <line x1="0" y1="42" x2="0" y2="34"/>
      <line x1="-42" y1="0" x2="-34" y2="0"/>
      <line x1="42" y1="0" x2="34" y2="0"/>
      <line x1="-30" y1="-30" x2="-25" y2="-25"/>
      <line x1="30" y1="-30" x2="25" y2="-25"/>
      <line x1="-30" y1="30" x2="-25" y2="25"/>
      <line x1="30" y1="30" x2="25" y2="25"/>
    </g>
    <g stroke="#8A6F38" stroke-width="0.5">
      <line x1="0" y1="-26" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="26" y2="0"/>
    </g>
    <circle r="3" fill="#C8A763"/>
    <circle r="2" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.3"/>
    <text x="62" y="-4" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="18" fill="#EFE6D1">AI</text>
    <text x="62" y="14" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="2">LLM · AGENTIC · MCP</text>
  </g>

  <!-- Transmission to escapement -->
  <g stroke="#8A6F38" stroke-width="0.6" fill="none" opacity="0.75">
    <path d="M 1000 240 Q 1100 240 1230 320" stroke-dasharray="2 3"/>
    <path d="M 1000 380 L 1230 380" stroke-dasharray="2 3"/>
    <path d="M 1000 520 Q 1100 520 1230 440" stroke-dasharray="2 3"/>
  </g>

  <!-- ============== ESCAPEMENT — Revenue & Retention (far right) ============== -->
  <!-- The "balance wheel" representing the final output - oscillating between Revenue and Retention -->
  <g transform="translate(1240, 380)">
    <circle r="90" fill="none" stroke="#C8A763" stroke-width="1"/>
    <circle r="80" fill="none" stroke="#5C4F38" stroke-width="0.4"/>
    <!-- spokes -->
    <g stroke="#C8A763" stroke-width="0.6">
      <line x1="0" y1="-90" x2="0" y2="90"/>
      <line x1="-90" y1="0" x2="90" y2="0"/>
      <line x1="-64" y1="-64" x2="64" y2="64"/>
      <line x1="64" y1="-64" x2="-64" y2="64"/>
    </g>
    <!-- hairspring -->
    <g stroke="#C8A763" stroke-width="0.4" fill="none" opacity="0.85">
      <circle r="10"/>
      <circle r="16"/>
      <circle r="22"/>
      <circle r="28"/>
      <circle r="34"/>
    </g>
    <!-- mass weights -->
    <circle cx="0"   cy="-90" r="4" fill="#C8A763"/>
    <circle cx="0"   cy="90"  r="4" fill="#C8A763"/>
    <circle cx="-90" cy="0"   r="4" fill="#C8A763"/>
    <circle cx="90"  cy="0"   r="4" fill="#C8A763"/>
    <circle cx="-64" cy="-64" r="3.5" fill="#8A6F38"/>
    <circle cx="64"  cy="-64" r="3.5" fill="#8A6F38"/>
    <circle cx="-64" cy="64"  r="3.5" fill="#8A6F38"/>
    <circle cx="64"  cy="64"  r="3.5" fill="#8A6F38"/>
    <!-- center jewel -->
    <circle r="5" fill="#C8A763"/>
    <circle r="3" fill="#7A3A2E" stroke="#C8A763" stroke-width="0.5"/>

    <!-- Output labels -->
    <text x="0" y="-110" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8A763" letter-spacing="4">THE OUTPUT</text>
    <text x="0" y="125" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="20" fill="#EFE6D1">Revenue · Retention</text>
    <text x="0" y="145" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A89D85" letter-spacing="3">COMPOUND · MEASURABLE · ATTRIBUTED</text>
  </g>

  <!-- Bottom engraved colophon -->
  <line x1="60"   y1="660" x2="200"  y2="660" stroke="#8A6F38" stroke-width="0.4"/>
  <line x1="1200" y1="660" x2="1340" y2="660" stroke="#8A6F38" stroke-width="0.4"/>
  <text x="700" y="664" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6E6553" letter-spacing="6">ASSEMBLED IN BANGALORE · SIX YEARS · TEN MARKETS · ADJUSTED FOR ROI</text>
</svg>
